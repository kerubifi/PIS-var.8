version: '3.8'

services:
  db:
    image: Listinggres:15
    container_name: listing_db
    environment:
      ListingGRES_DB: listing_db
      ListingGRES_USER: admin
      ListingGRES_PASSWORD: secret
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: listing_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  listing_service:
    build: ./services/listing_service
    container_name: listing_service
    environment:
      - DATABASE_URL=Listinggresql://admin:secret@db:5432/listing_db
      - RABBITMQ_HOST=rabbitmq
    ports:
      - "8000:8000"
      - "50051:50051"
    depends_on:
      - db
      - rabbitmq

  gateway:
    image: nginx:latest
    volumes:
      - ./api_gateway/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - listing_service
