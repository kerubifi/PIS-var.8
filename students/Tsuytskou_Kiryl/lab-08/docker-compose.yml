version: '3.8'

services:
  # Шина событий
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Основной сервис объявлений
  listing_service:
    build: ./services/listing_service
    environment:
      - DATABASE_URL=postgresql://admin:secret@db:5432/listing_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8001:8000"

  # Сервис категорий
  category_service:
    build: ./services/category_service
    environment:
      - DATABASE_URL=postgresql://admin:secret@db:5432/listing_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8002:8000"

  # Сервис модерации
  moderation_service:
    build: ./services/moderation_service
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "8003:8000"

  # API Gateway
  gateway:
    image: nginx:latest
    volumes:
      - ./api_gateway/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - listing_service
      - category_service
      - moderation_service

  # База данных
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: listing_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
